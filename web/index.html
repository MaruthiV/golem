<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>golem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbfaf8; --ink:#1c1b19; --muted:#77746d; --faint:#9c988f;
    --line:#e8e5df; --line2:#f0ede7; --accent:#42597a; --accent-soft:#e7ecf3;
    --serif:"Newsreader",Georgia,serif; --mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:var(--bg); color:var(--ink); font-family:var(--serif);
    -webkit-font-smoothing:antialiased; font-synthesis:none;}
  .wrap{max-width:760px; margin:0 auto; padding:96px 32px 80px;}
  @keyframes up{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
  .u{opacity:0; animation:up .8s cubic-bezier(.2,.7,.2,1) forwards;}
  .u2{animation-delay:.12s;} .u3{animation-delay:.24s;} .u4{animation-delay:.36s;}
  @media (prefers-reduced-motion:reduce){.u{opacity:1; animation:none;}}

  .kick{font-family:var(--mono); font-size:11px; font-weight:400; letter-spacing:.22em;
    text-transform:uppercase; color:var(--accent); margin-bottom:26px;}
  h1{font-family:var(--serif); font-weight:300; font-size:clamp(64px,11vw,104px); line-height:.95;
    letter-spacing:-.02em; margin:0;}
  .lede{font-family:var(--serif); font-weight:300; font-style:italic; font-size:clamp(19px,2.6vw,23px);
    color:var(--muted); margin-top:18px; max-width:30em;}
  hr{border:0; border-top:1px solid var(--line); margin:52px 0;}

  .diagram{margin:6px 0;}
  canvas{width:100%; display:block;}
  .status{display:flex; justify-content:space-between; align-items:baseline; gap:20px;
    font-family:var(--mono); font-size:12.5px; color:var(--muted); margin-top:20px; flex-wrap:wrap;}
  .status .now{color:var(--ink);}
  .status .now b{color:var(--accent); font-weight:500;}

  .lbl{font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--faint); margin-bottom:20px;}
  #story{font-family:var(--serif); font-weight:400; font-size:clamp(20px,2.7vw,24px); line-height:1.66;
    color:var(--ink); letter-spacing:.002em;}
  #story .cur{display:inline-block; width:.5em; color:var(--accent); animation:blink 1.1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}

  .colophon{display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap;
    font-family:var(--mono); font-size:11.5px; color:var(--faint); line-height:1.8;}
  .colophon b{color:var(--muted); font-weight:500;}
  .tempo{font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); background:none; border:0; border-bottom:1px solid var(--line); cursor:pointer; padding:2px 0;}
  .tempo:hover{color:var(--accent); border-color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <div class="kick u">a from-scratch processor · specimen 001</div>
  <h1 class="u u2">golem</h1>
  <div class="lede u u2">a language model, thinking on silicon I designed &amp; built by hand.</div>

  <hr class="u u3">

  <div class="diagram u u3">
    <canvas id="die" width="760" height="300"></canvas>
    <div class="status">
      <div class="now" id="now">awakening<b></b></div>
      <div id="right">1.35M cycles · token</div>
    </div>
  </div>

  <hr class="u u4">

  <div class="lbl u u4">what it writes</div>
  <div id="story" class="u u4"><span class="cur">│</span></div>

  <hr>

  <div class="colophon">
    <div>verified <b>bit-exact</b> against the golden model · <b>6.36M</b> params · int8 · <span id="tps">—</span> tok/s @ 27 MHz</div>
    <button class="tempo" id="tempo">tempo 1×</button>
  </div>
  <div class="colophon" style="margin-top:14px;">
    <div>made of MACs, on a Mac.</div>
    <div>golem · MMXXVI</div>
  </div>
</div>

<script>
const C=document.getElementById('die'), X=C.getContext('2d'), $=id=>document.getElementById(id);
let T=null, speed=1; const SPEEDS=[1,4,16];
const col={ink:'#1c1b19', muted:'#77746d', faint:'#c9c5bc', line:'#e2ded7', accent:'#42597a', soft:'#e7ecf3', bg:'#fbfaf8'};
const rgba=(h,a)=>{const n=parseInt(h.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;};
const ENG={};
const STAGES=[
  {k:'mem',   t:'weights',   x:0,   y:120, w:96,  h:36},
  {k:'rmsnorm',t:'norm',     x:150, y:40,  w:104, h:34},
  {k:'matmul',t:'projections',x:150,y:120, w:104, h:34},
  {k:'scores',t:'scores',    x:150, y:200, w:104, h:34},
  {k:'softmax',t:'softmax',  x:300, y:200, w:104, h:34},
  {k:'attn',  t:'attention', x:450, y:200, w:104, h:34},
  {k:'gelu',  t:'gelu',      x:300, y:120, w:104, h:34},
  {k:'buffer',t:'residual',  x:450, y:120, w:104, h:34},
];
function nodePath(x,y,w,h){const r=4;X.beginPath();X.moveTo(x+r,y);X.arcTo(x+w,y,x+w,y+h,r);X.arcTo(x+w,y+h,x,y+h,r);X.arcTo(x,y+h,x,y,r);X.arcTo(x,y,x+w,y,r);X.closePath();}

function draw(active,prog,layer){
  X.clearRect(0,0,C.width,C.height);
  const ox=8;
  // thin connectors
  X.strokeStyle=col.line; X.lineWidth=1;
  const link=(a,b)=>{const A=ENG[a],B=ENG[b];if(!A||!B)return;X.beginPath();
    X.moveTo(ox+A.x+A.w,A.y+A.h/2);X.lineTo(ox+B.x,B.y+B.h/2);X.stroke();};
  link('mem','rmsnorm');link('mem','matmul');link('mem','scores');
  link('matmul','gelu');link('scores','softmax');link('softmax','attn');link('gelu','buffer');

  for(const s of STAGES){
    const on=active.includes(s.k);
    nodePath(ox+s.x,s.y,s.w,s.h);
    if(on){ X.fillStyle=col.soft; X.fill();
      if(s.k==='matmul'||s.k==='mem'){ // subtle progress fill
        X.save(); nodePath(ox+s.x,s.y,s.w,s.h); X.clip();
        X.fillStyle=rgba(col.accent,.14); X.fillRect(ox+s.x,s.y,s.w*prog,s.h); X.restore();
      }
    }
    X.strokeStyle=on?col.accent:col.line; X.lineWidth=on?1.4:1; nodePath(ox+s.x,s.y,s.w,s.h); X.stroke();
    X.fillStyle=on?col.accent:col.muted;
    X.font=(on?'500 ':'400 ')+'12.5px "IBM Plex Mono", monospace';
    X.fillText(s.t, ox+s.x+12, s.y+s.h/2+4.5);
  }
  // attention heatmap — quiet, only during attention stages
  if((active.includes('softmax')||active.includes('attn'))&&T&&T.attention){
    const ax=ox+574,ay=196,cell=4,N=Math.min(26,T.attention.length);
    for(let i=0;i<N;i++)for(let j=0;j<=i;j++){
      X.fillStyle=rgba(col.accent,T.attention[i][j]/255*.6+.03);
      X.fillRect(ax+j*cell,ay+i*cell,cell-.6,cell-.6);
    }
  }
  // layer register — 8 quiet ticks
  const ly=278, tx=ox, tw=(C.width-16-140);
  X.fillStyle=col.faint; X.font='10px "IBM Plex Mono", monospace';
  X.fillText('LAYER', tx, ly+4);
  for(let i=0;i<8;i++){
    const cx=tx+52+i*(tw/9), on=i===layer;
    X.beginPath(); X.arc(cx,ly, on?4:2.6, 0, 7);
    X.fillStyle=on?col.accent:'transparent'; X.fill();
    X.strokeStyle=on?col.accent:col.line; X.lineWidth=1; X.stroke();
  }
}

const OPTEXT={norm:'root-mean-square norm',matmul_Q:'projecting queries',matmul_K:'projecting keys',
  matmul_V:'projecting values',scores:'scoring attention',softmax:'softmax over the past',
  attention:'gathering values',matmul_O:'output projection',matmul_up:'expanding to 768',
  matmul_down:'folding to 256',load:'staging'};
const OPMAP={matmul_Q:'matmul',matmul_K:'matmul',matmul_V:'matmul',matmul_O:'matmul',
  matmul_up:'gelu',matmul_down:'matmul',norm:'rmsnorm',scores:'scores',softmax:'softmax',
  attention:'attn',load:'buffer'};
let li=0,pi=0,el=0,scale=1,last=performance.now();
function tick(now){
  const dt=now-last; last=now;
  if(!T){requestAnimationFrame(tick);return;}
  const ph=T.phases[pi];
  el += dt*speed/Math.max(ph.dur*scale,70); const prog=Math.min(el,1);
  const eng=OPMAP[ph.op]||ph.engine; const active=[eng]; if(eng==='matmul')active.push('mem');
  draw(active,prog,li);
  $('now').innerHTML=(OPTEXT[ph.op]||ph.op)+' <b>· layer '+(li+1)+' of 8</b>';
  if(el>=1){el=0;pi++; if(pi>=T.phases.length){pi=0;li++; if(li>=T.n_layers)li=0;}}
  requestAnimationFrame(tick);
}
let wi=0,typer=null;
function startStory(){
  const box=$('story'); clearInterval(typer);
  typer=setInterval(()=>{
    if(wi>=T.words.length){clearInterval(typer);
      setTimeout(()=>{wi=0;box.innerHTML='<span class="cur">│</span>';startStory();},4500);return;}
    box.querySelector('.cur')?.remove();
    box.insertAdjacentText('beforeend',T.words[wi]); wi++;
    box.insertAdjacentHTML('beforeend','<span class="cur">│</span>');
  },135);
}
$('tempo').onclick=()=>{speed=SPEEDS[(SPEEDS.indexOf(speed)+1)%SPEEDS.length];$('tempo').textContent='tempo '+speed+'×';};

Promise.all([fetch('trace.json').then(r=>r.json()),(document.fonts?document.fonts.ready:Promise.resolve())])
.then(([d])=>{
  T=d; for(const s of STAGES)ENG[s.k]=s;
  scale=1500/Math.max(T.phases.reduce((a,p)=>a+p.dur,0),1);
  $('tps').textContent=(27e6/d.cycles_per_token).toFixed(0);
  $('right').textContent=(d.cycles_per_token/1e6).toFixed(2)+'M cycles · token';
  requestAnimationFrame(tick); startStory();
}).catch(()=>{$('now').textContent='run gen_trace.py first';});
</script>
</body>
</html>
